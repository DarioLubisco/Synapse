version: '3.8'

services:
  # -- Backend: FastAPI para Cierre de Caja --
  synapse-api:
    build: 
      context: ./backend
    container_name: synapse-api
    restart: unless-stopped
    environment:
      - DB_SERVER=amc.sql\efficacis3
      - DB_DATABASE=EnterpriseAdmin_AMC
      - DB_USERNAME=sa
      - DB_PASSWORD=Twinc3pt.
      - DRIVER={ODBC Driver 18 for SQL Server}
    volumes:
      - ./backend:/app
    deploy:
      resources:
        limits:
          memory: 256M

  # -- Frontend: Dashboard Glassmorphism --
  synapse-frontend:
    image: nginx:alpine
    container_name: synapse-frontend
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          memory: 256M
