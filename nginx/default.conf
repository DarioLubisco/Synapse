server {
    # Usar el DNS interno de Docker para resolver contenedores en tiempo de ejecución
    # Esto evita que Nginx colapse (crash loop) si el backend no está disponible al arrancar
    resolver 127.0.0.11 valid=30s;

    listen 80;
    server_name amc.caja amc.cuentaspagar amc.cuentasporpagar amc.pedidos amc.dashboard synapse.amc amc.synapse localhost;
    client_max_body_size 50M;

    # Servir Frontend
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ =404;
    }

    # Proxy a Backend Synapse API global (incluye CxP, Pedidos, etc.)
    location /api/ {
        proxy_pass http://synapse-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para el módulo de Caja
    location /caja/ {
        proxy_pass http://synapse-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para el módulo de Inventario
    location /inventario/ {
        proxy_pass http://synapse-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
